<!DOCTYPE html>
<html lang="ja">

</head>
<body>

  <div style="position: relative; width: 100%; max-width: 1000px; margin: 0 auto;">

  <img src="./bg0.png" style="position: absolute; left: 0px; top: 0px;">

  <img src="./butterfly.gif" style="position: absolute; left: 100px; top: 400px; width: 100px;">

  <img src="./butterfly.gif" style="position: absolute; left: 800px; top: 300px; width: 150px;">
    
        <p style="
            position: absolute;

            background-color: rgba(255, 255, 255, 0.6);

            padding: 10px 15px;
            border-radius: 5px;

            font-size: 20px;

            line-height: 1.7;
        ">            ぽかぽか陽気の穏やかな朝<br>花畑では、蝶々がのんびり飛んでいます　　　　
        </p>

</div>

</html>
